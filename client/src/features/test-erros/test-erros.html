<div class="flex ustify-center gap-3 pt-10">
    <button class="btn btn-neutral" (click)="get400Error()"> This is 400 Error</button>
    <button class="btn btn-acent" (click)="get500Error()"> This is 500 Error</button>
    <button class="btn btn-secondary" (click)="get401Error()"> This is 401 Error</button>
    <button class="btn btn-success" (click)="get404Error()"> This is 404 Error</button>
    <button class="btn btn-info" (click)="get400ValidationError()"> This is  Validation Error</button>
</div>


@if(validationErrors().length > 0){
    <div clas="card bg-base-100 flex mt-5 w-1/2 rounded-2xl p-3 mx-auto">
        <ul class="text-red-600 flex flex-col space-y-2">
            @for (error of validationErrors(); track $index) {
                <li> {{error}}</li>
            }
        </ul>

    </div>
}
